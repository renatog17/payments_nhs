spring.application.name=payments
server.port=8081
# =========================
# DATABASE (H2 em memória recomendado para simulaçăo)
# =========================
spring.datasource.url=jdbc:h2:mem:paymentsdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# =========================
# JPA / HIBERNATE
# =========================
#spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# cria tudo automaticamente (SEM migration)
spring.jpa.hibernate.ddl-auto=create-drop

# mostra SQL no console
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================
# H2 CONSOLE (opcional, mas útil)
# =========================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console